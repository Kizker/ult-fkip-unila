<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Preview Activity Diagrams</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f4f9; color: #333; }
  .container { max-width: 900px; margin: auto; }
  .diagram { margin-bottom: 40px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
  img { max-width: 100%; border: 1px solid #eaeaea; }
  h1 { text-align: center; margin-bottom: 40px; }
  h2 { color: #444; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
</style>
</head>
<body>
  <div class="container">
    <h1>Preview Final Activity Diagram (PlantUML)</h1>
    <p style="text-align: center; margin-bottom: 30px;">Berikut adalah keempat desain diagram yang telah disesuaikan persis dengan contoh format kolom (swimlane) hitam-putih Anda.</p>
    
    <div class="diagram">
      <h2>1. Autentikasi Pengguna</h2>
      <img src="06_activity_diagram_autentikasi.png" alt="Autentikasi" />
    </div>
    
    <div class="diagram">
      <h2>2. Pengajuan Layanan Akademik</h2>
      <img src="07_activity_diagram_pengajuan.png" alt="Pengajuan" />
    </div>
    
    <div class="diagram">
      <h2>3. Verifikasi dan Pemrosesan Dokumen</h2>
      <img src="08_activity_diagram_verifikasi.png" alt="Verifikasi" />
    </div>
    
    <div class="diagram">
      <h2>4. Manajemen Layanan dan Templat</h2>
      <img src="09_activity_diagram_manajemen.png" alt="Manajemen" />
    </div>
  </div>
</body>
</html>
